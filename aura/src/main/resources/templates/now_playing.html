<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA - Now Playing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
                    radial-gradient(circle at top,
                    rgba(132,0,255,0.25),
                    transparent 30%),

                    radial-gradient(circle at bottom,
                    rgba(0,183,255,0.2),
                    transparent 30%),

                    #050816;

            color:white;

            min-height:100vh;

            font-family:'Segoe UI',sans-serif;

            overflow-x:hidden;
        }

        /* MAIN CONTAINER */

        .player-container{

            max-width:500px;

            margin:auto;

            padding:25px 20px 140px;
        }

        /* TOP BAR */

        .top-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:30px;
        }

        .top-bar i{

            font-size:26px;

            color:#d7c2ff;

            cursor:pointer;
        }

        .album-info{

            text-align:center;
        }

        .album-info p{

            margin-bottom:3px;

            color:#c0c0c0;

            letter-spacing:2px;

            font-size:14px;
        }

        .album-info h5{

            color:#d6b3ff;

            font-weight:600;
        }

        /* ALBUM COVER */

        .album-cover{

            width:100%;

            border-radius:35px;

            overflow:hidden;

            box-shadow:
                    0 0 30px rgba(162,89,255,0.35),
                    0 0 60px rgba(0,212,255,0.15);

            animation:float 4s ease-in-out infinite;
        }

        .album-cover img{

            width:100%;

            height:100%;

            object-fit:cover;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-8px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* SONG DETAILS */

        .song-details{

            margin-top:35px;
        }

        .song-title{

            font-size:60px;

            font-weight:800;

            line-height:1;

            color:#e3ccff;
        }

        .artist-row{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-top:18px;
        }

        .artist-name{

            font-size:22px;

            color:#d0d0d0;
        }

        .song-badges{

            display:flex;

            align-items:center;

            gap:20px;
        }

        .lossless{

            background:rgba(72,127,255,0.18);

            color:#3fe3ff;

            padding:10px 18px;

            border-radius:14px;

            font-weight:bold;

            letter-spacing:2px;
        }

        .favorite-btn{

            font-size:32px;

            color:#d7c2ff;

            cursor:pointer;

            transition:0.3s;
        }

        .favorite-btn:hover{

            color:#ff4da6;

            transform:scale(1.1);
        }

        /* PROGRESS */

        .progress-section{

            margin-top:35px;
        }

        .custom-progress{

            height:10px;

            border-radius:20px;

            background:#25273d;

            overflow:hidden;
        }

        .custom-progress-bar{

            width:68%;

            height:100%;

            background:
                    linear-gradient(to right,
                    #47e8ff,
                    #ddb7ff);

            border-radius:20px;
        }

        .time-row{

            display:flex;

            justify-content:space-between;

            margin-top:12px;

            color:#d0d0d0;

            font-size:16px;
        }

        /* CONTROLS */

        .controls{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-top:55px;

            padding:0 10px;
        }

        .controls i{

            font-size:34px;

            color:#f0f0f0;

            cursor:pointer;

            transition:0.3s;
        }

        .controls i:hover{

            transform:scale(1.15);

            color:#b88cff;
        }

        .play-button{

            width:120px;

            height:120px;

            background:
                    linear-gradient(to bottom,
                    #e3ccff,
                    #cfb0ff);

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            box-shadow:
                    0 0 20px rgba(210,170,255,0.6);

            transition:0.3s;
        }

        .play-button i{

            font-size:55px;

            color:#6f29ff;
        }

        .play-button:hover{

            transform:scale(1.05);
        }

        .shuffle,
        .repeat{

            color:#3fe3ff !important;
        }

        /* BOTTOM NAVIGATION */

        .bottom-nav{

            position:fixed;

            bottom:20px;

            left:50%;

            transform:translateX(-50%);

            width:90%;

            max-width:500px;

            background:
                    rgba(20,20,35,0.85);

            backdrop-filter:blur(14px);

            border-radius:35px;

            padding:18px 0;

            display:flex;

            justify-content:space-around;

            align-items:center;

            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        .bottom-nav a{

            text-decoration:none;

            color:#bcbcbc;

            text-align:center;

            transition:0.3s;
        }

        .bottom-nav a:hover{

            color:#d7b8ff;
        }

        .bottom-nav i{

            display:block;

            font-size:32px;

            margin-bottom:8px;
        }

        .active-nav{

            color:#d7b8ff !important;
            position:relative;
        }

        .active-nav::after{

            content:'';

            position:absolute;

            width:100%;

            height:4px;

            background:#c792ff;

            left:0;

            bottom:-18px;

            border-radius:10px;
        }

        /* RESPONSIVE */

        @media(max-width:600px){

            .song-title{
                font-size:52px;
            }

            .play-button{

                width:100px;
                height:100px;
            }

            .play-button i{
                font-size:45px;
            }
        }

    </style>
</head>


<body>

<div class="player-container">

    <!-- TOP BAR -->
    <div class="top-bar">
        <i class="fa-solid fa-chevron-down" onclick="history.back()"></i>
        <div class="album-info">
            <p>PLAYING FROM ALBUM</p>
            <h5 id="albumName" th:text="${album != null ? album.name : ''}">Nocturnal Waves</h5>
        </div>
        <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <!-- ALBUM COVER -->
    <div class="album-cover">
        <img id="playerImage"
             th:src="${song != null ? song.imageUrl : ''}"
             src="https://images.unsplash.com/photo-1614149162883-504ce4d13909?q=80&w=800&auto=format&fit=crop"
             alt="Album Art">
    </div>

    <!-- SONG DETAILS -->
    <div class="song-details">
        <div class="song-title" id="playerTitle" th:text="${song != null ? song.title : ''}">Ethereal Drift</div>
        <div class="artist-row">
            <div class="artist-name" id="playerArtist" th:text="${song != null ? song.artist : ''}">Lumina Specter</div>
            <div class="song-badges">
                <div class="lossless">LOSSLESS</div>
				<button class="btn btn-sm text-danger"
				        th:if="${song != null}"
				        th:attr="data-songid=${song.songId}"
				        onclick="toggleFavourite(this)">

				    <i class="fa-regular fa-heart"></i>

				</button>
            </div>
        </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-section">
        <div class="custom-progress" id="progressBar">
            <div class="custom-progress-bar" id="progressFill"></div>
        </div>
        <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <i class="fa-solid fa-shuffle" id="shuffleBtn"></i>
        <i class="fa-solid fa-backward-step" id="prevBtn"></i>
        <div class="play-button" id="playBtn">
            <i class="fa-solid fa-play" id="playIcon"></i>
        </div>
        <i class="fa-solid fa-forward-step" id="nextBtn"></i>
        <i class="fa-solid fa-repeat" id="repeatBtn"></i>
    </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <a href="/usr/home" class="active-nav">
        <i class="fa-solid fa-house"></i>
        Home
    </a>
    <a href="/usr/search">
        <i class="fa-solid fa-magnifying-glass"></i>
        Search
    </a>
    <a href="/usr/playlists">
        <i class="fa-solid fa-music"></i>
        Playlists
    </a>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ─── PLAYER STATE ────────────────────────────────────────────────────────
    const audio      = window.globalAudioPlayer || new Audio();
    window.globalAudioPlayer = audio;

    let isShuffle    = false;
    let isRepeat     = false;
    let isLiked      = false;
    let isDragging   = false;

    // ─── DOM REFS ─────────────────────────────────────────────────────────────
    const playBtn      = document.getElementById("playBtn");
    const playIcon     = document.getElementById("playIcon");
    const playerTitle  = document.getElementById("playerTitle");
    const playerArtist = document.getElementById("playerArtist");
    const playerImage  = document.getElementById("playerImage");
    const progressBar  = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const currentTimeEl= document.getElementById("currentTime");
    const totalTimeEl  = document.getElementById("totalTime");
    const favoriteBtn  = document.getElementById("favoriteBtn");
    const shuffleBtn   = document.getElementById("shuffleBtn");
    const repeatBtn    = document.getElementById("repeatBtn");
    const prevBtn      = document.getElementById("prevBtn");
    const nextBtn      = document.getElementById("nextBtn");

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, "0");
        return `${m}:${s}`;
    }

    function updatePlayIcon() {
        if (audio.paused) {
            playIcon.classList.replace("fa-pause", "fa-play");
            playerImage.classList.remove("playing");
        } else {
            playIcon.classList.replace("fa-play", "fa-pause");
            playerImage.classList.add("playing");
        }
    }

    // ─── RESTORE FROM LOCALSTORAGE ───────────────────────────────────────────
    window.addEventListener("load", () => {
        const savedSong   = localStorage.getItem("currentSong");
        const savedTitle  = localStorage.getItem("currentTitle");
        const savedArtist = localStorage.getItem("currentArtist");
        const savedImage  = localStorage.getItem("currentImage");
        const savedTime   = parseFloat(localStorage.getItem("currentTime")) || 0;
        const wasPlaying  = localStorage.getItem("isPlaying") === "true";

        // Thymeleaf may have already injected values; only override if blank
        if (savedSong && !audio.src) {
            audio.src = savedSong;
        }

        if (savedTitle  && !playerTitle.textContent.trim())  playerTitle.textContent  = savedTitle;
        if (savedArtist && !playerArtist.textContent.trim()) playerArtist.textContent = savedArtist;
        if (savedImage  && playerImage.getAttribute("src") === "") playerImage.src = savedImage;

        audio.addEventListener("loadedmetadata", () => {
            audio.currentTime = savedTime;
            totalTimeEl.textContent = formatTime(audio.duration);
            if (wasPlaying) audio.play().catch(() => {});
        }, { once: true });

        // If src already loaded (cached)
        if (audio.readyState >= 1) {
            audio.currentTime = savedTime;
            totalTimeEl.textContent = formatTime(audio.duration);
            if (wasPlaying) audio.play().catch(() => {});
        }

        updatePlayIcon();
    });

    // ─── PLAY / PAUSE ────────────────────────────────────────────────────────
    playBtn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play().catch(err => console.warn("Play blocked:", err));
        } else {
            audio.pause();
        }
    });

    audio.addEventListener("play",  () => {
        updatePlayIcon();
        localStorage.setItem("isPlaying", "true");
    });

    audio.addEventListener("pause", () => {
        updatePlayIcon();
        localStorage.setItem("isPlaying", "false");
    });

    // ─── PROGRESS BAR UPDATE ─────────────────────────────────────────────────
    audio.addEventListener("timeupdate", () => {
        if (isDragging) return;
        localStorage.setItem("currentTime", audio.currentTime);

        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        progressFill.style.width = pct + "%";
        currentTimeEl.textContent = formatTime(audio.currentTime);
        totalTimeEl.textContent   = formatTime(audio.duration);
    });

    // ─── SEEK ON CLICK ────────────────────────────────────────────────────────
    progressBar.addEventListener("click", (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pct  = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * audio.duration;
    });

    // ─── SEEK ON DRAG ────────────────────────────────────────────────────────
    progressBar.addEventListener("mousedown", () => { isDragging = true; });
    document.addEventListener("mouseup",  (e) => {
        if (!isDragging) return;
        isDragging = false;
        const rect = progressBar.getBoundingClientRect();
        const pct  = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
        audio.currentTime = pct * audio.duration;
    });
    document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const rect = progressBar.getBoundingClientRect();
        const pct  = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
        progressFill.style.width = (pct * 100) + "%";
        currentTimeEl.textContent = formatTime(pct * audio.duration);
    });

    // Touch support
    progressBar.addEventListener("touchstart", () => { isDragging = true; }, { passive: true });
    document.addEventListener("touchend", (e) => {
        if (!isDragging) return;
        isDragging = false;
        const touch = e.changedTouches[0];
        const rect  = progressBar.getBoundingClientRect();
        const pct   = Math.min(Math.max((touch.clientX - rect.left) / rect.width, 0), 1);
        audio.currentTime = pct * audio.duration;
    });
    document.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        const touch = e.changedTouches[0];
        const rect  = progressBar.getBoundingClientRect();
        const pct   = Math.min(Math.max((touch.clientX - rect.left) / rect.width, 0), 1);
        progressFill.style.width = (pct * 100) + "%";
        currentTimeEl.textContent = formatTime(pct * audio.duration);
    }, { passive: true });

    // ─── PREVIOUS / NEXT ─────────────────────────────────────────────────────
    prevBtn.addEventListener("click", () => {
        // If more than 3s in, restart current; else go to previous
        if (audio.currentTime > 3) {
            audio.currentTime = 0;
        } else {
            fetch("/api/songs/previous")
                .then(r => r.json())
                .then(loadSong)
                .catch(() => { audio.currentTime = 0; });
        }
    });

    nextBtn.addEventListener("click", () => {
        fetch(`/api/songs/next${isShuffle ? "?shuffle=true" : ""}`)
            .then(r => r.json())
            .then(loadSong)
            .catch(() => {});
    });

    // ─── AUTO-NEXT ON END ────────────────────────────────────────────────────
    audio.addEventListener("ended", () => {
        if (isRepeat) {
            audio.currentTime = 0;
            audio.play();
        } else {
            nextBtn.click();
        }
    });

    // ─── LOAD SONG (from API response) ───────────────────────────────────────
    function loadSong(song) {
        if (!song || !song.audioUrl) return;

        audio.src = song.audioUrl;
        audio.play().catch(() => {});

        playerTitle.textContent  = song.title  || "";
        playerArtist.textContent = song.artist || "";
        playerImage.src          = song.imageUrl || "";

        localStorage.setItem("currentSong",   song.audioUrl);
        localStorage.setItem("currentTitle",  song.title  || "");
        localStorage.setItem("currentArtist", song.artist || "");
        localStorage.setItem("currentImage",  song.imageUrl || "");
        localStorage.setItem("currentTime",   "0");
        localStorage.setItem("isPlaying",     "true");
    }

    // ─── SHUFFLE ─────────────────────────────────────────────────────────────
    shuffleBtn.addEventListener("click", () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle("active", isShuffle);
    });

    // ─── REPEAT ──────────────────────────────────────────────────────────────
    repeatBtn.addEventListener("click", () => {
        isRepeat = !isRepeat;
        repeatBtn.classList.toggle("active", isRepeat);
        audio.loop = isRepeat;
    });

    // ─── FAVOURITE ───────────────────────────────────────────────────────────
    favoriteBtn.addEventListener("click", () => {
        isLiked = !isLiked;
        favoriteBtn.classList.toggle("fa-solid",  isLiked);
        favoriteBtn.classList.toggle("fa-regular", !isLiked);
        favoriteBtn.classList.toggle("liked", isLiked);

        // Optional: POST to backend
       const songId = /*[[${song != null ? song.songId : 'null'}]]*/ null;
        if (songId) {
            fetch(`/api/songs/${songId}/favourite`, { method: "POST" }).catch(() => {});
        }
    });
	
	function toggleFavourite(button) {

	    const songId =
	            button.getAttribute("data-songid");

				fetch("/playlist/toggleFavourite/" + songId, {
				    method: "POST"
				})
	    .then(response => response.text())

	    .then(data => {

	        const icon = button.querySelector("i");

	        // SONG ADDED
	        if(data === "ADDED") {

	            icon.classList.remove("fa-regular");

	            icon.classList.add("fa-solid");
	        }

	        // SONG REMOVED
	        else if(data === "REMOVED") {

	            icon.classList.remove("fa-solid");

	            icon.classList.add("fa-regular");
	        }

	    })

	    .catch(error => {

	        console.error(error);

	    });
	}
</script>

</body>
</html>
