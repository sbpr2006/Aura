<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>AURA - Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body{
            background:
                    linear-gradient(rgba(0,0,0,0.88),
                    rgba(0,0,0,0.92)),
                    url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-attachment:fixed;
            background-position:center;

            color:white;
            font-family:'Segoe UI',sans-serif;

            padding-bottom:170px;
        }

        /* NAVBAR */

        .navbar{
            background:rgba(0,0,0,0.75);
            backdrop-filter:blur(12px);
        }

        .navbar-brand{
            color:#8b5cf6 !important;
            font-size:32px;
            font-weight:bold;
            letter-spacing:3px;
        }

        .profile-btn{

            width:45px;
            height:45px;

            border-radius:50%;
            background:#8b5cf6;

            display:flex;
            justify-content:center;
            align-items:center;

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        .profile-btn:hover{
            transform:scale(1.08);
            box-shadow:0 0 12px rgba(139,92,246,0.7);
        }

        /* HERO */

        .hero-section{
            padding:60px 0 40px;
        }

        .hero-title{
            font-size:55px;
            font-weight:800;
            line-height:1.2;
        }

        .hero-title span{
            color:#8b5cf6;
        }

        .hero-text{
            color:#b3b3b3;
            font-size:18px;
            margin-top:15px;
            max-width:650px;
        }

        /* SECTION */

        .section-title{
            font-size:30px;
            font-weight:bold;
            margin-bottom:25px;
            color:#ffffff;
        }

        /* CARDS */

        .music-card{

            background:rgba(25,25,25,0.95);

            border:none;

            border-radius:22px;

            overflow:hidden;

            transition:0.3s;

            height:100%;
        }

        .music-card:hover{

            transform:translateY(-8px);

            box-shadow:0 10px 25px rgba(0,0,0,0.6);
        }

        .music-card img{

            height:220px;

            object-fit:cover;
        }

        .music-card .card-body{
            color:white;
        }

        .music-card h5{
            font-weight:bold;
        }

        .music-card p{
            color:#b3b3b3;
        }

        .play-btn{

            width:45px;
            height:45px;

            background:#8b5cf6;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            position:absolute;

            bottom:20px;
            right:20px;

            opacity:0;

            transition:0.3s;
        }

        .music-card:hover .play-btn{
            opacity:1;
        }

        /* ARTISTS */

        .artist-card{
            text-align:center;
        }

        .artist-card img{

            width:130px;
            height:130px;

            border-radius:50%;

            object-fit:cover;

            border:4px solid #8b5cf6;

            transition:0.3s;
        }

        .artist-card img:hover{

            transform:scale(1.08);

            box-shadow:0 0 15px rgba(139,92,246,0.7);
        }

        .artist-card h5{
            margin-top:15px;
        }


        .song-info{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .song-info img{

            width:60px;
            height:60px;

            border-radius:15px;

            object-fit:cover;
        }

        .song-name{
            font-weight:bold;
        }

        .artist-name{
            color:#b3b3b3;
            font-size:14px;
        }

        .player-controls i{

            font-size:24px;

            margin:0 14px;

            cursor:pointer;

            transition:0.3s;
        }

        .player-controls i:hover{
            color:#8b5cf6;
        }

        .main-play{
            font-size:38px !important;
            color:#8b5cf6;
        }

		
        /* RESPONSIVE */

        @media(max-width:768px){

            .hero-title{
                font-size:38px;
            }

            .player-bar{

                flex-direction:column;

                gap:12px;

                text-align:center;
            }

            .song-info{
                flex-direction:column;
            }
        }
		
		
		.horizontal-slider{

		    display:flex;
		    gap:20px;

		    overflow-x:auto;
		    scroll-behavior:smooth;

		    scrollbar-width:none;

		    padding-bottom:10px;
		}

		.horizontal-slider::-webkit-scrollbar{
		    display:none;
		}

		.music-slide-card{

		    min-width:220px;
		    max-width:220px;

		    flex:0 0 auto;
		}

		.slider-controls{

		    display:flex;
		    gap:10px;
		}

		.slide-btn{

		    width:40px;
		    height:40px;

		    border:none;
		    border-radius:50%;

		    background:#1e1e1e;
		    color:white;

		    transition:0.3s;
		}

		.slide-btn:hover{

		    background:#8A2BE2;
		    transform:scale(1.1);
		}

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4 sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">AURA</a>
        <div class="profile-btn"
             th:text="${#strings.substring(session.username,0,1).toUpperCase()}"
             onclick="window.location.href='/usr/profile'">
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<div class="container hero-section">
    <h1 class="hero-title">
        Feel The Music With <span>AURA</span>
    </h1>
    <p class="hero-text">
        Stream trending songs, discover artists,
        and immerse yourself in an unlimited musical experience.
    </p>
</div>

<!-- TRENDING SONGS -->
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2 class="section-title mb-0">
            Top Trending Songs
        </h2>

        <div class="slider-controls">

            <button class="slide-btn"
                    onclick="slideLeft('songsRow')">

                <i class="fa-solid fa-chevron-left"></i>

            </button>

            <button class="slide-btn"
                    onclick="slideRight('songsRow')">

                <i class="fa-solid fa-chevron-right"></i>

            </button>

        </div>

    </div>

    <div class="horizontal-slider" id="songsRow">

        <div class="music-slide-card"
             th:each="song : ${songs}">

			 <div class="card music-card h-100 position-relative"
			 	     style="cursor:pointer;"
			 	     th:attr="
			 	     data-title=${song.title},
			 	     data-artist=${song.artist},
			 	     data-image=${song.imagePath},
			 	     data-audio=${song.filePath},
			 	     data-songid=${song.songId}"
			 	     onclick="playSong(this)">

			 	    <img th:src="@{${song.imagePath}}"
			 	         class="card-img-top"
			 	         alt="Song Image">

			 	    <div class="card-body">

			 	        <h6 class="fw-bold"
			 	            th:text="${song.title}">
			 	            Song Title
			 	        </h6>

			 	        <p class="text-secondary small mb-0"
			 	           th:text="${song.artist}">
			 	            Artist Name
			 	        </p>

			 	    </div>

			 	    <div class="play-btn">
			 	        <i class="fa-solid fa-play"></i>
			 	    </div>

			 	</div>


        </div>

    </div>

</div>

<!-- TRENDING PLAYLISTS -->
<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2 class="section-title mb-0">Trending Playlists</h2>

        <div class="slider-controls">
            <button class="slide-btn" onclick="slideLeft('playlistRow')">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="slide-btn" onclick="slideRight('playlistRow')">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

    </div>

    <div class="horizontal-slider" id="playlistRow">

        <div class="music-slide-card"
             th:each="playlist : ${playlists}">

            <div class="card music-card h-100 position-relative"
                 style="cursor:pointer;"
                 th:data-href="@{/usr/myplaylist/{id}(id=${playlist.playlistId})}"
                 onclick="window.location.href=this.getAttribute('data-href')">

                <img src="https://picsum.photos/400?2"
                     class="card-img-top"
                     alt="Playlist Image">

                <div class="card-body">

                    <h6 class="fw-bold"
                        th:text="${playlist.playlistName}">
                        Playlist Name
                    </h6>

                    <p class="text-secondary small mb-0">
                        <i class="fa-solid fa-headphones"></i>
                        <span th:text="${playlist.playedCount}">0</span>
                        listeners
                    </p>

                </div>

                <button class="play-btn"
                        th:attr="data-playlistid=${playlist.playlistId}"
                        onclick="event.stopPropagation(); playAllSongs(this)">
                    <i class="fa-solid fa-play"></i>
                </button>

            </div>

        </div>

    </div>

</div>
<!-- PLAYER BAR -->
<div th:replace="player.html"></div>

<script src="/player.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
