<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA - Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Segoe UI',sans-serif;

            background:
                    linear-gradient(rgba(0,0,0,0.82),
                    rgba(0,0,0,0.90)),
                    url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            overflow:hidden;
        }

        /* LOGIN CARD */

        .login-card{

            width:100%;
            max-width:430px;

            background:rgba(20,20,20,0.92);

            backdrop-filter:blur(14px);

            border-radius:28px;

            padding:42px;

            box-shadow:0 10px 40px rgba(0,0,0,0.6);

            color:white;

            border:1px solid rgba(139,92,246,0.2);
        }

        /* BRAND */

        .brand-logo{
            text-align:center;
            margin-bottom:35px;
        }

        .brand-logo i{

            font-size:58px;

            color:#8b5cf6;

            text-shadow:0 0 18px rgba(139,92,246,0.7);
        }

        .brand-logo h1{

            margin-top:14px;

            font-size:42px;

            font-weight:800;

            letter-spacing:4px;

            color:#ffffff;
        }

        .brand-logo p{
            color:#b3b3b3;
            font-size:15px;
        }

        /* FORM */

        .form-label{
            color:#d1d1d1;
            margin-bottom:8px;
        }

        .form-control{

            background:#222;

            border:none;

            color:white;

            padding:14px;

            border-radius:12px;
        }

        .form-control:focus{

            background:#2c2c2c;

            color:white;

            border:1px solid #8b5cf6;

            box-shadow:none;
        }

        .input-group-text{

            background:#222;

            border:none;

            color:#8b5cf6;

            border-radius:12px 0 0 12px;
        }

        .form-check-input:checked{
            background-color:#8b5cf6;
            border-color:#8b5cf6;
        }

        .forgot-password{

            color:#8b5cf6;

            text-decoration:none;

            font-size:14px;
        }

        .forgot-password:hover{
            text-decoration:underline;
        }

        /* BUTTON */

        .login-btn{

            width:100%;

            padding:13px;

            border:none;

            border-radius:14px;

            background:
                    linear-gradient(to right,
                    #8b5cf6,
                    #7c3aed);

            color:white;

            font-size:18px;

            font-weight:bold;

            transition:0.3s;
        }

        .login-btn:hover{

            transform:scale(1.03);

            box-shadow:0 0 15px rgba(139,92,246,0.6);
        }

        /* REGISTER */

        .register-text{

            text-align:center;

            margin-top:22px;

            color:#b3b3b3;
        }

        .register-text a{

            color:#8b5cf6;

            text-decoration:none;

            font-weight:bold;
        }

        .register-text a:hover{
            text-decoration:underline;
        }

        /* RESPONSIVE */

        @media(max-width:500px){

            .login-card{
                margin:20px;
                padding:30px;
            }

            .brand-logo h1{
                font-size:34px;
            }
        }

    </style>
</head>

<body>

<div class="login-card">

    <!-- BRAND -->

    <div class="brand-logo">

        <i class="fa-solid fa-headphones"></i>

        <h1>AURA</h1>

        <p>
            Immerse Yourself In Music 🎵
        </p>

    </div>

    <!-- LOGIN FORM -->
	<div th:if="${message}" 
	     th:class="'alert ' + (${messageType} == 'success' ? 'alert-success' : 'alert-danger')">
	    <p th:text="${message}"></p>
	</div>


    <form th:action="@{/usr/login}" method="post">

        <!-- EMAIL / USERNAME -->

        <div class="mb-4">

            <label class="form-label">
                Email / Username
            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fa-solid fa-user"></i>

                </span>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter your email or username"
                       required>

            </div>

        </div>

        <!-- PASSWORD -->

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fa-solid fa-lock"></i>

                </span>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>

            </div>

        </div>

        <!-- REMEMBER ME + FORGOT -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="form-check">

                <input class="form-check-input"
                       type="checkbox"
                       id="rememberMe">

                <label class="form-check-label"
                       for="rememberMe">

                    Remember Me

                </label>

            </div>

            <a href="#"
               class="forgot-password">

                Forgot Password?

            </a>

        </div>

        <!-- LOGIN BUTTON -->

        <button type="submit"
                class="login-btn">

            <i class="fa-solid fa-right-to-bracket"></i>

            Login To AURA

        </button>

        <!-- REGISTER -->

        <div class="register-text">

            New to AURA?

            <a th:href="@{/usr/register}" href="#">

                Create Account

            </a>

        </div>

    </form>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
