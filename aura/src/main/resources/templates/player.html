<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<body>

<!-- GLOBAL PLAYER BAR -->
	<div class="player-bar"
	     id="playerBar"
		 onclick="goToNowPlaying()">
	
	    <!-- SONG DETAILS -->
	
	    <div class="now-playing">
	
	        <img id="playerImage"
	             src="https://picsum.photos/200"
	             alt="Now Playing">
	
	        <div>
	
	            <div class="fw-bold"
	                 id="playerTitle">
	
	                No Song Playing
	
	            </div>
	
	            <small class="text-secondary"
	                   id="playerArtist">
	
	                Unknown Artist
	
	            </small>
	
	        </div>
	
	    </div>
	
	    <!-- PLAYER CONTROLS -->
	
	    <div class="player-controls">
	
	        <button class="control-btn"
	                onclick="event.stopPropagation(); prevSong()">
	
	            <i class="fa-solid fa-backward-step"></i>
	
	        </button>
	
	        <button class="control-btn"
	                onclick="event.stopPropagation(); togglePlay()">
	
	            <i id="playPauseBtn"
	               class="fa-solid fa-circle-play main-play"></i>
	
	        </button>
	
	        <button class="control-btn"
	                onclick="event.stopPropagation(); nextSong()">
	
	            <i class="fa-solid fa-forward-step"></i>
	
	        </button>
	
	    </div>
	
	</div>


<!-- PLAYER STYLE -->

<style>
	/* BOTTOM NAVIGATION */
	.bottom-nav{

	    position:fixed;

	    bottom:0;

	    left:0;

	    width:100%;

	    height:75px;

	    background:#000;

	    border-top:1px solid #222;

	    display:flex;

	    justify-content:space-around;

	    align-items:center;

	    z-index:1000;
	}

	/* NAV ITEMS */

	.bottom-nav a{

	    flex:1;

	    height:100%;

	    display:flex;

	    flex-direction:column;

	    justify-content:center;

	    align-items:center;

	    text-decoration:none;

	    color:#b3b3b3;

	    font-size:13px;

	    transition:0.3s;
	}

	.bottom-nav a:hover{

	    color:#8b5cf6;

	    background:rgba(255,255,255,0.03);
	}

	/* ICONS */

	.bottom-nav i{

	    font-size:20px;

	    margin-bottom:4px;
	}

	.player-bar{

	    position:fixed;

	    bottom:65px;

	    left:0;

	    width:100%;

	    background:rgba(10,10,10,0.95);

	    backdrop-filter:blur(10px);

	    border-top:1px solid #333;

	    padding:15px 25px;

	    z-index:999;

	    display:flex;

	    justify-content:space-between;

	    align-items:center;
	}
.player-bar:hover{

    background:#181818;
}

.now-playing{

    display:flex;
    align-items:center;

    gap:15px;
    pointer-events:none;
}

.now-playing img{

    width:60px;
    height:60px;

    border-radius:10px;

    object-fit:cover;
}

.player-controls{

    display:flex;
    align-items:center;

    gap:25px;
    pointer-events:none;
}
.control-btn{
    pointer-events:all;

    background:none;
    border:none;

    color:white;

    font-size:22px;

    transition:0.3s;
}

.control-btn:hover{

    color:#8b5cf6;

    transform:scale(1.1);
}

.main-play{

    font-size:38px;
}
</style>

<!-- PLAYER SCRIPT -->

<script>

    // GLOBAL AUDIO PLAYER

    if(!window.globalAudioPlayer){

        window.globalAudioPlayer =
            new Audio();
    }

    const audioPlayer =
        window.globalAudioPlayer;

    // PAGE LOAD

    window.addEventListener("load", () => {

        const savedSong =
            localStorage.getItem("currentSong");

        const savedTitle =
            localStorage.getItem("currentTitle");

        const savedArtist =
            localStorage.getItem("currentArtist");

        const savedImage =
            localStorage.getItem("currentImage");

        const savedTime =
            localStorage.getItem("currentTime");

        const isPlaying =
            localStorage.getItem("isPlaying");

        // UPDATE UI

        if(savedTitle){

            document
                .getElementById("playerTitle")
                .innerText = savedTitle;
        }

        if(savedArtist){

            document
                .getElementById("playerArtist")
                .innerText = savedArtist;
        }

        if(savedImage){

            document
                .getElementById("playerImage")
                .src = savedImage;
        }

        // LOAD AUDIO

        if(savedSong){

            audioPlayer.src =
                savedSong;
        }

        // RESTORE TIME

        if(savedTime){

            audioPlayer.currentTime =
                parseFloat(savedTime);
        }

        // RESTORE PLAY STATE

        if(isPlaying === "true"){

            audioPlayer.play()
                .catch(() => {});

            document
                .getElementById("playPauseBtn")
                .classList.replace(
                    "fa-circle-play",
                    "fa-circle-pause"
                );
        }
    });

    // PLAY / PAUSE

    function togglePlay(){

        const btn =
            document.getElementById(
                "playPauseBtn"
            );

        if(audioPlayer.paused){

            audioPlayer.play();

            btn.classList.replace(
                "fa-circle-play",
                "fa-circle-pause"
            );

            localStorage.setItem(
                "isPlaying",
                "true"
            );

        }else{

            audioPlayer.pause();

            btn.classList.replace(
                "fa-circle-pause",
                "fa-circle-play"
            );

            localStorage.setItem(
                "isPlaying",
                "false"
            );
        }
    }
	// NEXT SONG
	function nextSong(){

	    fetch("/api/songs/next")

	    .then(response => response.json())

	    .then(song => {

	        if(!song){

	            return;
	        }

	        loadSong(song);
	    })

	    .catch(error => {

	        console.error(error);

	    });
	}

	// PREVIOUS SONG
	function prevSong(){

	    fetch("/api/songs/previous")

	    .then(response => response.json())

	    .then(song => {

	        if(!song){

	            return;
	        }

	        loadSong(song);
	    })

	    .catch(error => {

	        console.error(error);

	    });
	}
		
    // SAVE CURRENT TIME

    audioPlayer.addEventListener(
        "timeupdate",
        () => {

            localStorage.setItem(
                "currentTime",
                audioPlayer.currentTime
            );
        }
    );

	// OPEN NOW PLAYING PAGE

	function goToNowPlaying(){
	        const songId =
	            localStorage.getItem("currentSongId");

	        window.location.href =
	            "/usr/nowPlaying?songId=" + (songId || "");
	    }
</script>
<script src="/player.js"></script>
<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">
    <a href="/usr/home"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/usr/search"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
    <a href="/usr/playlists"><i class="fa-solid fa-music"></i> Playlists</a>
    <a href="/usr/profile"><i class="fa-solid fa-user"></i> Profile</a>
</div>

</body>
</html>
