<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>AURA - Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body{
            background:
                    linear-gradient(rgba(0,0,0,0.88),
                    rgba(0,0,0,0.92)),
                    url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-attachment:fixed;
            background-position:center;

            color:white;
            font-family:'Segoe UI',sans-serif;

            padding-bottom:170px;
        }

        /* NAVBAR */

        .navbar{
            background:rgba(0,0,0,0.75);
            backdrop-filter:blur(12px);
        }

        .navbar-brand{
            color:#8b5cf6 !important;
            font-size:32px;
            font-weight:bold;
            letter-spacing:3px;
        }

        .profile-btn{

            width:45px;
            height:45px;

            border-radius:50%;
            background:#8b5cf6;

            display:flex;
            justify-content:center;
            align-items:center;

            color:white;

            cursor:pointer;

            transition:0.3s;
        }

        .profile-btn:hover{
            transform:scale(1.08);
            box-shadow:0 0 12px rgba(139,92,246,0.7);
        }

        /* HERO */

        .hero-section{
            padding:60px 0 40px;
        }

        .hero-title{
            font-size:55px;
            font-weight:800;
            line-height:1.2;
        }

        .hero-title span{
            color:#8b5cf6;
        }

        .hero-text{
            color:#b3b3b3;
            font-size:18px;
            margin-top:15px;
            max-width:650px;
        }

        /* SECTION */

        .section-title{
            font-size:30px;
            font-weight:bold;
            margin-bottom:25px;
            color:#ffffff;
        }

        /* CARDS */

        .music-card{

            background:rgba(25,25,25,0.95);

            border:none;

            border-radius:22px;

            overflow:hidden;

            transition:0.3s;

            height:100%;
        }

        .music-card:hover{

            transform:translateY(-8px);

            box-shadow:0 10px 25px rgba(0,0,0,0.6);
        }

        .music-card img{

            height:220px;

            object-fit:cover;
        }

        .music-card .card-body{
            color:white;
        }

        .music-card h5{
            font-weight:bold;
        }

        .music-card p{
            color:#b3b3b3;
        }

        .play-btn{

            width:45px;
            height:45px;

            background:#8b5cf6;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            position:absolute;

            bottom:20px;
            right:20px;

            opacity:0;

            transition:0.3s;
        }

        .music-card:hover .play-btn{
            opacity:1;
        }

        /* ARTISTS */

        .artist-card{
            text-align:center;
        }

        .artist-card img{

            width:130px;
            height:130px;

            border-radius:50%;

            object-fit:cover;

            border:4px solid #8b5cf6;

            transition:0.3s;
        }

        .artist-card img:hover{

            transform:scale(1.08);

            box-shadow:0 0 15px rgba(139,92,246,0.7);
        }

        .artist-card h5{
            margin-top:15px;
        }

        /* PLAYER BAR */

        .player-bar{

            position:fixed;

            bottom:70px;

            width:100%;

            background:rgba(10,10,10,0.95);

            backdrop-filter:blur(10px);

            border-top:1px solid #333;

            padding:15px 25px;

            z-index:999;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .song-info{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .song-info img{

            width:60px;
            height:60px;

            border-radius:15px;

            object-fit:cover;
        }

        .song-name{
            font-weight:bold;
        }

        .artist-name{
            color:#b3b3b3;
            font-size:14px;
        }

        .player-controls i{

            font-size:24px;

            margin:0 14px;

            cursor:pointer;

            transition:0.3s;
        }

        .player-controls i:hover{
            color:#8b5cf6;
        }

        .main-play{
            font-size:38px !important;
            color:#8b5cf6;
        }

        /* BOTTOM NAVIGATION */

        .bottom-nav{

            position:fixed;

            bottom:0;

            width:100%;

            background:#000;

            border-top:1px solid #222;

            display:flex;
            justify-content:space-around;

            padding:12px 0;

            z-index:1000;
        }

        .bottom-nav a{

            color:#b3b3b3;

            text-decoration:none;

            text-align:center;

            transition:0.3s;
        }

        .bottom-nav a:hover{
            color:#8b5cf6;
        }

        .bottom-nav i{

            display:block;

            font-size:22px;

            margin-bottom:5px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .hero-title{
                font-size:38px;
            }

            .player-bar{

                flex-direction:column;

                gap:12px;

                text-align:center;
            }

            .song-info{
                flex-direction:column;
            }
        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark px-4 sticky-top">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">
            AURA
        </a>

		<div class="profile-btn"
		     th:text="${#strings.substring(session.username,0,1).toUpperCase()}"
		     onclick="window.location.href='/usr/profile'">
		</div>

    </div>

</nav>

<!-- HERO SECTION -->

<div class="container hero-section">

    <h1 class="hero-title">

        Feel The Music With
        <span>AURA</span>

    </h1>

    <p class="hero-text">

        Stream trending songs, discover artists,
        and immerse yourself in an unlimited musical experience.

    </p>

</div>



<!-- TRENDING SONGS -->

<div class="container mt-4">

    <h2 class="section-title">
        Top Trending Songs
    </h2>

    <div class="row g-4">

        <!-- DYNAMIC SONGS -->

        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6"
             th:each="song : ${songs}">

            <div class="card music-card h-100 position-relative">

                <!-- SONG IMAGE -->

				<img th:src="@{${song.imagePath}}"
				     class="card-img-top"
				     alt="Song Image">
                <!-- SONG DETAILS -->

                <div class="card-body">

                    <h6 class="fw-bold"
                        th:text="${song.title}">

                        Song Title

                    </h6>

                    <p class="text-secondary small mb-0"
                       th:text="${song.artist}">

                        Artist Name

                    </p>

                </div>

                <!-- PLAY BUTTON -->
				<button class="play-btn"

				        th:attr="
				        data-title=${song.title},
				        data-artist=${song.artist},
				        data-image=${song.imagePath},
				        data-audio=${song.filePath}"

				        onclick="playSong(this)">

				    <i class="fa-solid fa-play"></i>

				</button>

            </div>

        </div>

    </div>

</div>

<!-- PLAYLISTS -->
<!-- TRENDING PLAYLISTS -->

<div class="container mt-5">
    <h2 class="section-title mb-4">
        Trending Playlists
    </h2>
    <div class="row g-4">
        <!-- PLAYLIST CARD -->
        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-6"
             th:each="playlist : ${playlists}">
            <div class="card music-card h-100 position-relative">
                <!-- PLAYLIST IMAGE -->
                <img src="https://picsum.photos/400?2"
                     class="card-img-top"
                     alt="Playlist Image">
					 
                <!-- PLAYLIST DETAILS -->
				
                <div class="card-body">

                    <h6 class="fw-bold"
                        th:text="${playlist.playlistName}">

                        Playlist Name

                    </h6>

                    <p class="text-secondary small mb-0">

                        <i class="fa-solid fa-headphones"></i>

                        <span th:text="${playlist.playedCount}">
                            0
                        </span>

                        listeners

                    </p>

                </div>

                <!-- PLAY BUTTON -->

				<div class="playlist-btn">

				    <a th:href="@{/usr/playlist/{id}(id=${playlist.playlistId})}">

				        <i class="fa-solid fa-play"></i>

				    </a>

				</div>

            </div>

        </div>

    </div>

</div>

<!-- PLAYER BAR -->
<!-- PLAYER BAR -->
<div class="player-bar">

    <!-- SONG INFO -->
    <div class="song-info">
        <img id="playerImage" src="https://picsum.photos/200?4">

        <div>
            <div class="song-name" id="playerTitle">No Song Playing</div>
            <div class="artist-name" id="playerArtist">Select a Song</div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="player-controls">
        <!-- PREVIOUS -->
        <i class="fa-solid fa-backward-step" onclick="prevSong()"></i>

        <!-- PLAY / PAUSE -->
        <i class="fa-solid fa-circle-play main-play"
           id="playPauseBtn"
           onclick="togglePlay()"></i>

        <!-- NEXT -->
        <i class="fa-solid fa-forward-step" onclick="nextSong()"></i>
    </div>
</div>

<!-- AUDIO PLAYER -->
<audio id="audioPlayer"></audio>

<!-- PLAYER SCRIPT -->
<script>
    // Elements
    const audioPlayer  = document.getElementById("audioPlayer");
    const playPauseBtn = document.getElementById("playPauseBtn");

    let currentSongIndex = 0;
    let songs = [];

    // Load song buttons on page load
    window.onload = function () {
        songs = document.querySelectorAll(".play-btn");
    };

    // Play selected song
	function playSong(button) {
	    currentSongIndex = Array.from(songs).indexOf(button);

	    const title  = button.getAttribute("data-title");
	    const artist = button.getAttribute("data-artist");
	    const image  = button.getAttribute("data-image");
	    const audio  = button.getAttribute("data-audio");

	    document.getElementById("playerTitle").innerText  = title;
	    document.getElementById("playerArtist").innerText = artist;
	    document.getElementById("playerImage").src        = image;

	   
	    let cleanPath = audio.trim().replace(/^\/+/, "");
	    audioPlayer.src = "/" + cleanPath;
	    audioPlayer.load();  
	    audioPlayer.play().catch(e => console.error("Playback error:", e));
		// SAVE CURRENT TIME
		audioPlayer.addEventListener("timeupdate", () => {
		    localStorage.setItem("currentTime", audioPlayer.currentTime);
		});
		// SAVE CURRENT SONG
		localStorage.setItem("currentSong", audioPlayer.src);
		localStorage.setItem("currentTitle", title);
		localStorage.setItem("currentArtist", artist);
		localStorage.setItem("currentImage", image);
		localStorage.setItem("currentTime", 0);

	    console.log("Audio path:", audioPlayer.src);

	    playPauseBtn.classList.remove("fa-circle-play");
	    playPauseBtn.classList.add("fa-circle-pause");
	}

    // Toggle play/pause
    function togglePlay() {
        if (audioPlayer.src === "") return;

        if (audioPlayer.paused) {
            audioPlayer.play();
            playPauseBtn.classList.remove("fa-circle-play");
            playPauseBtn.classList.add("fa-circle-pause");
        } else {
            audioPlayer.pause();
            playPauseBtn.classList.remove("fa-circle-pause");
            playPauseBtn.classList.add("fa-circle-play");
        }
    }

    // Play next song
    function nextSong() {
        if (songs.length === 0) return;

        currentSongIndex++;
        if (currentSongIndex >= songs.length) {
            currentSongIndex = 0;
        }

        playSong(songs[currentSongIndex]);
    }

    // Play previous song
    function prevSong() {
        if (songs.length === 0) return;

        currentSongIndex--;
        if (currentSongIndex < 0) {
            currentSongIndex = songs.length - 1;
        }

        playSong(songs[currentSongIndex]);
    }

    // Auto play next song when current ends
    audioPlayer.addEventListener("ended", nextSong);
	// RESTORE SONG AFTER PAGE RELOAD
	window.addEventListener("load", () => {

	    const savedSong   = localStorage.getItem("currentSong");
	    const savedTitle  = localStorage.getItem("currentTitle");
	    const savedArtist = localStorage.getItem("currentArtist");
	    const savedImage  = localStorage.getItem("currentImage");
	    const savedTime   = localStorage.getItem("currentTime");

	    if(savedSong){

	        audioPlayer.src = savedSong;

	        document.getElementById("playerTitle").innerText  = savedTitle;
	        document.getElementById("playerArtist").innerText = savedArtist;
	        document.getElementById("playerImage").src        = savedImage;

	        audioPlayer.currentTime = savedTime;

	        // OPTIONAL AUTO PLAY
	        audioPlayer.play();

	        playPauseBtn.classList.remove("fa-circle-play");
	        playPauseBtn.classList.add("fa-circle-pause");
	    }
	});
	
	/* UPDATE TIME CONTINUOUSLY */

	audioPlayer.addEventListener("timeupdate", () => {

	    let savedSong = localStorage.getItem("currentSong");

	    if(savedSong){

	        let song = JSON.parse(savedSong);

	        song.time = audioPlayer.currentTime;

	        song.isPlaying = !audioPlayer.paused;

	        localStorage.setItem("currentSong", JSON.stringify(song));
	    }
	});
	
</script>
<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">
    <a href="/usr/home"><i class="fa-solid fa-house"></i> Home</a>
    <a href="/usr/search"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
    <a href="/usr/playlist"><i class="fa-solid fa-music"></i> Playlists</a>
    <a href="/usr/profile"><i class="fa-solid fa-user"></i> Profile</a>
</div>
<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
