<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA - Now Playing</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
                    radial-gradient(circle at top,
                    rgba(132,0,255,0.25),
                    transparent 30%),

                    radial-gradient(circle at bottom,
                    rgba(0,183,255,0.2),
                    transparent 30%),

                    #050816;

            color:white;

            min-height:100vh;

            font-family:'Segoe UI',sans-serif;

            overflow-x:hidden;
        }

        /* MAIN CONTAINER */

        .player-container{

            max-width:500px;

            margin:auto;

            padding:25px 20px 140px;
        }

        /* TOP BAR */

        .top-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:30px;
        }

        .top-bar i{

            font-size:26px;

            color:#d7c2ff;

            cursor:pointer;
        }

        .album-info{

            text-align:center;
        }

        .album-info p{

            margin-bottom:3px;

            color:#c0c0c0;

            letter-spacing:2px;

            font-size:14px;
        }

        .album-info h5{

            color:#d6b3ff;

            font-weight:600;
        }

        /* ALBUM COVER */

        .album-cover{

            width:100%;

            border-radius:35px;

            overflow:hidden;

            box-shadow:
                    0 0 30px rgba(162,89,255,0.35),
                    0 0 60px rgba(0,212,255,0.15);

            animation:float 4s ease-in-out infinite;
        }

        .album-cover img{

            width:100%;

            height:100%;

            object-fit:cover;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-8px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        /* SONG DETAILS */

        .song-details{

            margin-top:35px;
        }

        .song-title{

            font-size:60px;

            font-weight:800;

            line-height:1;

            color:#e3ccff;
        }

        .artist-row{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-top:18px;
        }

        .artist-name{

            font-size:22px;

            color:#d0d0d0;
        }

        .song-badges{

            display:flex;

            align-items:center;

            gap:20px;
        }

        .lossless{

            background:rgba(72,127,255,0.18);

            color:#3fe3ff;

            padding:10px 18px;

            border-radius:14px;

            font-weight:bold;

            letter-spacing:2px;
        }

        .favorite-btn{

            font-size:32px;

            color:#d7c2ff;

            cursor:pointer;

            transition:0.3s;
        }

        .favorite-btn:hover{

            color:#ff4da6;

            transform:scale(1.1);
        }

        /* PROGRESS */

        .progress-section{

            margin-top:35px;
        }

        .custom-progress{

            height:10px;

            border-radius:20px;

            background:#25273d;

            overflow:hidden;
        }

        .custom-progress-bar{

            width:68%;

            height:100%;

            background:
                    linear-gradient(to right,
                    #47e8ff,
                    #ddb7ff);

            border-radius:20px;
        }

        .time-row{

            display:flex;

            justify-content:space-between;

            margin-top:12px;

            color:#d0d0d0;

            font-size:16px;
        }

        /* CONTROLS */

        .controls{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-top:55px;

            padding:0 10px;
        }

        .controls i{

            font-size:34px;

            color:#f0f0f0;

            cursor:pointer;

            transition:0.3s;
        }

        .controls i:hover{

            transform:scale(1.15);

            color:#b88cff;
        }

        .play-button{

            width:120px;

            height:120px;

            background:
                    linear-gradient(to bottom,
                    #e3ccff,
                    #cfb0ff);

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            box-shadow:
                    0 0 20px rgba(210,170,255,0.6);

            transition:0.3s;
        }

        .play-button i{

            font-size:55px;

            color:#6f29ff;
        }

        .play-button:hover{

            transform:scale(1.05);
        }

        .shuffle,
        .repeat{

            color:#3fe3ff !important;
        }

        /* BOTTOM NAVIGATION */

        .bottom-nav{

            position:fixed;

            bottom:20px;

            left:50%;

            transform:translateX(-50%);

            width:90%;

            max-width:500px;

            background:
                    rgba(20,20,35,0.85);

            backdrop-filter:blur(14px);

            border-radius:35px;

            padding:18px 0;

            display:flex;

            justify-content:space-around;

            align-items:center;

            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        .bottom-nav a{

            text-decoration:none;

            color:#bcbcbc;

            text-align:center;

            transition:0.3s;
        }

        .bottom-nav a:hover{

            color:#d7b8ff;
        }

        .bottom-nav i{

            display:block;

            font-size:32px;

            margin-bottom:8px;
        }

        .active-nav{

            color:#d7b8ff !important;
            position:relative;
        }

        .active-nav::after{

            content:'';

            position:absolute;

            width:100%;

            height:4px;

            background:#c792ff;

            left:0;

            bottom:-18px;

            border-radius:10px;
        }

        /* RESPONSIVE */

        @media(max-width:600px){

            .song-title{
                font-size:52px;
            }

            .play-button{

                width:100px;
                height:100px;
            }

            .play-button i{
                font-size:45px;
            }
        }
		
		.dropdown-menu{

		    background:rgba(20,20,35,0.95);

		    backdrop-filter:blur(10px);

		    min-width:230px;
		}

		.dropdown-item{

		    color:#ffffff;

		    transition:0.3s;
		}

		.dropdown-item:hover{

		    background:rgba(139,92,246,0.25);

		    color:#d7b8ff;
		}
    </style>
</head>

<body>

<div class="player-container">

    <!-- TOP BAR -->

    <div class="top-bar">

        <i class="fa-solid fa-chevron-down"
           onclick="history.back()"></i>

        <div class="album-info">

            <p>PLAYING FROM ALBUM</p>

            <h5 id="albumName"
                th:text="${song != null ? song.album : ''}">

                Nocturnal Waves

            </h5>

        </div>

        <i class="fa-solid fa-ellipsis-vertical"></i>

    </div>

    <!-- ALBUM COVER -->

    <div class="album-cover">

        <img id="playerImage"

             th:src="${song != null ? song.imagePath : ''}"

             src="https://images.unsplash.com/photo-1614149162883-504ce4d13909?q=80&w=800&auto=format&fit=crop"

             alt="Album Art">

    </div>

    <!-- SONG DETAILS -->

    <div class="song-details">

        <div class="song-title"

             id="playerTitle"

             th:text="${song != null ? song.title : ''}">

            Ethereal Drift

        </div>

        <div class="artist-row">

            <div class="artist-name"

                 id="playerArtist"

                 th:text="${song != null ? song.artist : ''}">

                Lumina Specter

            </div>

            <div class="song-badges">

                <!-- ADD TO PLAYLIST -->

                <div class="dropdown">

                    <button class="btn btn-sm btn-outline-light dropdown-toggle px-3 py-2"

                            type="button"

                            data-bs-toggle="dropdown">

                        <i class="fa-solid fa-plus me-2"></i>

                        Add To Playlist

                    </button>

                    <ul class="dropdown-menu dropdown-menu-dark rounded-4 border-0 shadow">

                        <li th:each="pl : ${userPlaylists}">

                            <form th:action="@{/playlist/addSongById}"

                                  method="post">

                                <input type="hidden"

                                       name="playlistId"

                                       th:value="${pl.playlistId}">

                                <input type="hidden"

                                       name="songId"

                                       th:value="${song.songId}">

                                <button type="submit"

                                        class="dropdown-item py-2">

                                    <i class="fa-solid fa-music me-2"></i>

                                    <span th:text="${pl.playlistName}">

                                        Chill Vibes

                                    </span>

                                </button>

                            </form>

                        </li>

                    </ul>

                </div>

                <!-- FAVOURITE -->

                <button id="favoriteBtn"

                        class="btn btn-sm text-danger"

                        th:attr="data-songid=${song.songId}"

                        onclick="toggleFavourite(this)">

                    <i th:class="${isFavourite} ?

                    'fa-solid fa-heart' :

                    'fa-regular fa-heart'">

                    </i>

                </button>

            </div>

        </div>

    </div>

    <!-- PROGRESS -->

    <div class="progress-section">

        <div class="custom-progress"

             id="progressBar">

            <div class="custom-progress-bar"

                 id="progressFill"></div>

        </div>

        <div class="time-row">

            <span id="currentTime">

                0:00

            </span>

            <span id="totalTime">

                0:00

            </span>

        </div>

    </div>

    <!-- CONTROLS -->

    <div class="controls">

        <i class="fa-solid fa-shuffle"

           id="shuffleBtn"></i>

        <i class="fa-solid fa-backward-step"

           id="prevBtn"></i>

        <div class="play-button"

             id="playBtn">

            <i class="fa-solid fa-play"

               id="playIcon"></i>

        </div>

        <i class="fa-solid fa-forward-step"

           id="nextBtn"></i>

        <i class="fa-solid fa-repeat"

           id="repeatBtn"></i>

    </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <a href="/usr/home"
       class="active-nav">

        <i class="fa-solid fa-house"></i>

        Home

    </a>

    <a href="/usr/search">

        <i class="fa-solid fa-magnifying-glass"></i>

        Search

    </a>

    <a href="/usr/playlists">

        <i class="fa-solid fa-music"></i>

        Playlists

    </a>

</div>

<!-- BOOTSTRAP -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const audio =
    window.globalAudioPlayer || new Audio();

window.globalAudioPlayer = audio;

// FLAGS

let isShuffle = false;

let isRepeat = false;

// ELEMENTS

const playBtn =
    document.getElementById("playBtn");

const playIcon =
    document.getElementById("playIcon");

const playerTitle =
    document.getElementById("playerTitle");

const playerArtist =
    document.getElementById("playerArtist");

const playerImage =
    document.getElementById("playerImage");

const progressBar =
    document.getElementById("progressBar");

const progressFill =
    document.getElementById("progressFill");

const currentTimeEl =
    document.getElementById("currentTime");

const totalTimeEl =
    document.getElementById("totalTime");

const shuffleBtn =
    document.getElementById("shuffleBtn");

const repeatBtn =
    document.getElementById("repeatBtn");

const prevBtn =
    document.getElementById("prevBtn");

const nextBtn =
    document.getElementById("nextBtn");

// FORMAT TIME

function formatTime(sec){

    if(isNaN(sec)) return "0:00";

    const m =
        Math.floor(sec / 60);

    const s =
        Math.floor(sec % 60)
        .toString()
        .padStart(2,"0");

    return m + ":" + s;
}

// UPDATE PLAY ICON

function updatePlayIcon(){

    if(audio.paused){

        playIcon.classList.remove("fa-pause");

        playIcon.classList.add("fa-play");

        playerImage.classList.remove("playing");
    }

    else{

        playIcon.classList.remove("fa-play");

        playIcon.classList.add("fa-pause");

        playerImage.classList.add("playing");
    }
}

// LOAD SAVED SONG

window.addEventListener("load", () => {

    const savedSong =
        localStorage.getItem("currentSong");

    const savedTitle =
        localStorage.getItem("currentTitle");

    const savedArtist =
        localStorage.getItem("currentArtist");

    const savedImage =
        localStorage.getItem("currentImage");

    const savedTime =
        parseFloat(
            localStorage.getItem("currentTime")
        ) || 0;

    const isPlaying =
        localStorage.getItem("isPlaying");

    if(savedSong){

        audio.src = savedSong;

        audio.currentTime = savedTime;
    }

    if(savedTitle){

        playerTitle.innerText =
            savedTitle;
    }

    if(savedArtist){

        playerArtist.innerText =
            savedArtist;
    }

    if(savedImage){

        playerImage.src =
            savedImage;
    }

    if(isPlaying === "true"){

        audio.play()
        .catch(error => {

            console.log(error);

        });
    }

    updatePlayIcon();
});

// PLAY / PAUSE

playBtn.addEventListener("click", () => {

    if(audio.paused){

        audio.play();
    }

    else{

        audio.pause();
    }
});

// PLAY EVENT

audio.addEventListener("play", () => {

    localStorage.setItem(
        "isPlaying",
        "true"
    );

    updatePlayIcon();
});

// PAUSE EVENT

audio.addEventListener("pause", () => {

    localStorage.setItem(
        "isPlaying",
        "false"
    );

    updatePlayIcon();
});

// TIME UPDATE

audio.addEventListener("timeupdate", () => {

    localStorage.setItem(
        "currentTime",
        audio.currentTime
    );

    const percent =
        (audio.currentTime / audio.duration) * 100;

    progressFill.style.width =
        percent + "%";

    currentTimeEl.innerText =
        formatTime(audio.currentTime);

    totalTimeEl.innerText =
        formatTime(audio.duration);
});

// SEEK

progressBar.addEventListener("click", (e) => {

    const rect =
        progressBar.getBoundingClientRect();

    const percent =
        (e.clientX - rect.left) / rect.width;

    audio.currentTime =
        percent * audio.duration;
});

// LOAD SONG

function loadSong(song){

    if(!song || !song.filePath){

        return;
    }

    const path =
        song.filePath.startsWith("/")
        ? song.filePath
        : "/" + song.filePath;

    audio.src = path;

    audio.load();

    audio.play()

    .then(() => {

        playerTitle.innerText =
            song.title || "";

        playerArtist.innerText =
            song.artist || "";

        playerImage.src =
            song.imagePath || "";

        localStorage.setItem(
            "currentSong",
            audio.src
        );

        localStorage.setItem(
            "currentSongId",
            song.songId
        );

        localStorage.setItem(
            "currentTitle",
            song.title || ""
        );

        localStorage.setItem(
            "currentArtist",
            song.artist || ""
        );

        localStorage.setItem(
            "currentImage",
            song.imagePath || ""
        );

        localStorage.setItem(
            "currentTime",
            "0"
        );

        localStorage.setItem(
            "isPlaying",
            "true"
        );

        fetch(
            "/usr/song/incrementRepeat?songId="
            + song.songId,
            {
                method:"POST"
            }
        );

    })

    .catch(error => {

        console.log(error);

    });
}

// NEXT SONG

nextBtn.addEventListener("click", () => {

    fetch(
        `/api/songs/next${isShuffle ? "?shuffle=true" : ""}`
    )

    .then(res => res.json())

    .then(song => {

        loadSong(song);

    })

    .catch(error => {

        console.log(error);

    });
});

// PREVIOUS SONG

prevBtn.addEventListener("click", () => {

    if(audio.currentTime > 3){

        audio.currentTime = 0;

        return;
    }

    fetch("/api/songs/previous")

    .then(res => res.json())

    .then(song => {

        loadSong(song);

    })

    .catch(error => {

        console.log(error);

    });
});

// AUTO NEXT

audio.addEventListener("ended", () => {

    if(isRepeat){

        audio.currentTime = 0;

        audio.play();

        return;
    }

    nextBtn.click();
});

// SHUFFLE

shuffleBtn.addEventListener("click", () => {

    isShuffle = !isShuffle;

    shuffleBtn.classList.toggle(
        "active",
        isShuffle
    );
});

// REPEAT

repeatBtn.addEventListener("click", () => {

    isRepeat = !isRepeat;

    repeatBtn.classList.toggle(
        "active",
        isRepeat
    );

    audio.loop = isRepeat;
});

// TOGGLE FAVOURITE

function toggleFavourite(button){

    const songId =
        button.getAttribute("data-songid");

    fetch(
        "/playlist/toggleFavourite/" + songId,
        {
            method:"POST"
        }
    )

    .then(response => response.text())

    .then(data => {

        const icon =
            button.querySelector("i");

        if(data === "ADDED"){

            icon.classList.remove("fa-regular");

            icon.classList.add("fa-solid");
        }

        else if(data === "REMOVED"){

            icon.classList.remove("fa-solid");

            icon.classList.add("fa-regular");
        }
    })

    .catch(error => {

        console.log(error);

    });
}

</script>

</body>
</html>
