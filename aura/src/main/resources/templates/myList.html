<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA - My Playlist</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <!-- Animate CSS -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{

            background:
                    linear-gradient(rgba(0,0,0,0.88),
                    rgba(0,0,0,0.96)),
                    url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-attachment:fixed;

            color:white;

            font-family:'Segoe UI',sans-serif;

            min-height:100vh;

            padding-bottom:120px;
        }

        /* NAVBAR */

        .navbar{

            background:rgba(0,0,0,0.75);

            backdrop-filter:blur(10px);

            box-shadow:0 3px 12px rgba(0,0,0,0.4);
        }

        .navbar-brand{

            color:#9d6bff !important;

            font-size:32px;

            font-weight:800;

            letter-spacing:2px;
        }

        /* PLAYLIST HEADER */

        .playlist-header{

            background:
                    linear-gradient(to right,
                    rgba(157,107,255,0.25),
                    rgba(124,58,237,0.15));

            border-radius:30px;

            padding:35px;

            margin-top:40px;

            margin-bottom:35px;

            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        .playlist-name{

            font-size:42px;

            font-weight:800;

            color:#ffffff;
        }

        .playlist-info{

            color:#cfcfcf;

            margin-top:10px;
        }

        /* SONG LIST */

        .song-card{

            background:rgba(24,24,24,0.95);

            border-radius:22px;

            padding:18px;

            margin-bottom:18px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            transition:0.3s;

            border:1px solid transparent;
        }

        .song-card:hover{

            transform:translateY(-4px);

            background:#232323;

            border:1px solid rgba(157,107,255,0.3);
        }

        /* CURRENTLY PLAYING */

        .playing{

            background:
                    linear-gradient(to right,
                    rgba(157,107,255,0.22),
                    rgba(124,58,237,0.18));

            border:1px solid #9d6bff;

            box-shadow:0 0 18px rgba(157,107,255,0.4);
        }

        .playing .song-title{

            color:#b48cff;
        }

        .playing-animation{

            color:#9d6bff;

            margin-left:10px;

            animation:pulse 1s infinite;
        }

        @keyframes pulse{

            0%{
                opacity:0.4;
            }

            50%{
                opacity:1;
            }

            100%{
                opacity:0.4;
            }
        }

        /* SONG INFO */

        .song-info{

            display:flex;

            align-items:center;

            gap:18px;
        }

        .song-info img{

            width:75px;

            height:75px;

            border-radius:18px;

            object-fit:cover;
        }

        .song-title{

            font-size:20px;

            font-weight:bold;
        }

        .artist{

            color:#b3b3b3;

            margin-top:4px;
        }

        /* SONG ACTIONS */

        .song-actions i{

            font-size:20px;

            margin-left:22px;

            cursor:pointer;

            transition:0.3s;
        }

        .song-actions i:hover{

            color:#9d6bff;

            transform:scale(1.2);
        }

        .play-btn{

            color:#9d6bff;
        }

        .delete-btn{

            color:#ff4d4d;
        }

      


        
    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <div class="container-fluid">

        <a class="navbar-brand animate__animated animate__fadeInLeft"
           href="#">

            AURA

        </a>

		<a href="/usr/playlist" class="btn btn-outline-light">Back</a>
		   

    </div>

</nav>

<!-- MAIN CONTAINER -->

<div class="container">

    <!-- PLAYLIST HEADER -->

    <div class="playlist-header animate__animated animate__fadeIn">

        <h1 class="playlist-name"
            th:text="${playlist.playlistName}">

            Chill Vibes

        </h1>

        <p class="playlist-info">

            Total Songs:
            <span th:text="${playlistSongs != null ? #lists.size(playlistSongs) : 0}">
                15
            </span>

        </p>

    </div>

	<!-- SONG LIST -->

	<div th:if="${#lists.isEmpty(playlistSongs)}"
	     class="text-center text-secondary mt-5">

	    No Songs In Playlist

	</div>

	<div th:each="ps : ${playlistSongs}"

	     class="song-card animate__animated animate__fadeInUp">

	    <!-- SONG INFO -->

	    <div class="song-info">

	        <img th:src="@{${ps.song.imagePath}}"
	             src="https://picsum.photos/200">

	        <div>

	            <div class="song-title">

	                <span th:text="${ps.song.title}">
	                    Perfect
	                </span>

	            </div>

	            <div class="artist"
	                 th:text="${ps.song.artist}">

	                Ed Sheeran

	            </div>

	        </div>

	    </div>

	    <!-- SONG ACTIONS -->

	    <div class="song-actions">

	        <!-- PLAY SONG -->

	        <button class="btn btn-sm text-light play-btn"

	                th:attr="
	                data-title=${ps.song.title},
	                data-artist=${ps.song.artist},
	                data-image=${ps.song.imagePath},
	                data-audio=${ps.song.filePath}"

	                onclick="playSong(this)">

	            <i class="fa-solid fa-circle-play"></i>

	        </button>

	        <!-- REMOVE SONG -->

	        <form th:action="@{/playlist/removeSong}"
	              method="post">

	            <input type="hidden"
	                   name="playlistSongId"
	                   th:value="${ps.playlistSongId}">

	            <button type="submit"
	                    class="btn btn-sm text-danger">

	                <i class="fa-solid fa-trash"></i>

	            </button>

	        </form>

	    </div>
	</div>

<script src="/player.js"></script>
<div th:replace="player.html"></div>



<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
