
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA - Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            font-family:'Segoe UI',sans-serif;

            background:
                    linear-gradient(rgba(0,0,0,0.75),
                    rgba(0,0,0,0.85)),
                    url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
        }

        .register-card{
            width:100%;
            max-width:500px;
            background:rgba(18,18,18,0.90);
            backdrop-filter:blur(15px);
            border-radius:28px;
            padding:40px;
            color:white;
            box-shadow:0 10px 40px rgba(0,0,0,0.6);
        }

        .brand-logo{
            text-align:center;
            margin-bottom:30px;
        }

        .brand-logo i{
            font-size:58px;
            color:#8b5cf6;
        }

        .brand-logo h1{
            margin-top:12px;
            font-size:42px;
            font-weight:800;
            letter-spacing:3px;
        }

        .brand-logo p{
            color:#b3b3b3;
            font-size:15px;
        }

        .form-label{
            color:#d1d1d1;
            margin-bottom:8px;
        }

        .form-control{
            background:#222;
            border:1px solid #333;
            color:white;
            padding:14px;
            border-radius:12px;
        }

        .form-control:focus{
            background:#2d2d2d;
            color:white;
            border:1px solid #8b5cf6;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:#999;
        }

        .input-group-text{
            background:#222;
            border:1px solid #333;
            color:#8b5cf6;
            border-radius:12px 0 0 12px;
        }

        .register-btn{
            width:100%;
            padding:13px;
            border:none;
            border-radius:14px;
            background:linear-gradient(to right,#8b5cf6,#7c3aed);
            color:white;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .register-btn:hover{
            transform:scale(1.03);
            box-shadow:0 0 15px rgba(139,92,246,0.6);
        }

        .login-text{
            text-align:center;
            margin-top:22px;
            color:#b3b3b3;
        }

        .login-text a{
            color:#8b5cf6;
            text-decoration:none;
            font-weight:bold;
        }

        .login-text a:hover{
            text-decoration:underline;
        }

        .form-check-input:checked{
            background-color:#8b5cf6;
            border-color:#8b5cf6;
        }

        .terms{
            font-size:14px;
            color:#b3b3b3;
        }

        @media(max-width:550px){

            .register-card{
                padding:30px;
            }

            .brand-logo h1{
                font-size:34px;
            }
        }

    </style>
</head>

<body>

<div class="register-card">

    <div class="brand-logo">
        <i class="fa-solid fa-headphones"></i>
        <h1>AURA</h1>
        <p>Create your music universe 🎶</p>
    </div>

  <!-- ALERT MESSAGE -->

<div th:if="${message != null}"
     th:classappend="${messageType == 'success'} ? 'alert-success' : 'alert-danger'"
     class="alert text-center mb-4">

    <span th:text="${message}"></span>

</div>

    <!-- REGISTER FORM -->

	<form th:action="@{/usr/addUser}" method="post">


        <!-- FULL NAME -->

        <div class="mb-3">
            <label class="form-label">Full Name</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-user"></i>
                </span>

                <input type="text"
                       class="form-control"
                       name="fullname"
                       placeholder="Enter your name"
                       required>
            </div>
        </div>

        <!-- EMAIL -->

        <div class="mb-3">
            <label class="form-label">Email Address</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-envelope"></i>
                </span>

                <input type="email"
                       class="form-control"
                       name="email"
                       placeholder="Enter your email"
                       required>
            </div>
        </div>

        <!-- USERNAME -->

        <div class="mb-3">
            <label class="form-label">Username</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-at"></i>
                </span>

                <input type="text"
                       class="form-control"
                       name="username"
                       placeholder="Choose a username"
                       required>
            </div>
        </div>

        <!-- PASSWORD -->

        <div class="mb-3">
            <label class="form-label">Password</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input type="password"
                       class="form-control"
                       name="password"
                       placeholder="Create password"
                       required>
            </div>
        </div>

        <!-- CONFIRM PASSWORD -->

        <div class="mb-4">
            <label class="form-label">Confirm Password</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-shield"></i>
                </span>

                <input type="password"
                       class="form-control"
                       name="confirmPassword"
                       placeholder="Confirm password"
                       required>
            </div>
        </div>

        <!-- TERMS -->

        <div class="form-check mb-4">
            <input class="form-check-input"
                   type="checkbox"
                   id="terms"
                   required>

            <label class="form-check-label terms" for="terms">
                I agree to the Terms & Conditions
            </label>
        </div>

        <!-- REGISTER BUTTON -->

        <button type="submit" class="register-btn">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
        </button>

        <!-- LOGIN -->

        <div class="login-text">
            Already have an account?

            <a href="/usr/loginPage">Login</a>
        </div>

    </form>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
