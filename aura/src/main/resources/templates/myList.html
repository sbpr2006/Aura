<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AURA - My Playlist</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <!-- Animate CSS -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        body{

            background:
                    linear-gradient(rgba(0,0,0,0.88),
                    rgba(0,0,0,0.96)),
                    url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-attachment:fixed;

            color:white;

            font-family:'Segoe UI',sans-serif;

            min-height:100vh;

            padding-bottom:120px;
        }

        /* NAVBAR */

        .navbar{

            background:rgba(0,0,0,0.75);

            backdrop-filter:blur(10px);

            box-shadow:0 3px 12px rgba(0,0,0,0.4);
        }

        .navbar-brand{

            color:#9d6bff !important;

            font-size:32px;

            font-weight:800;

            letter-spacing:2px;
        }

        /* PLAYLIST HEADER */

        .playlist-header{

            background:
                    linear-gradient(to right,
                    rgba(157,107,255,0.25),
                    rgba(124,58,237,0.15));

            border-radius:30px;

            padding:35px;

            margin-top:40px;

            margin-bottom:35px;

            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        .playlist-name{

            font-size:42px;

            font-weight:800;

            color:#ffffff;
        }

        .playlist-info{

            color:#cfcfcf;

            margin-top:10px;
        }

        /* SONG LIST */

        .song-card{

            background:rgba(24,24,24,0.95);

            border-radius:22px;

            padding:18px;

            margin-bottom:18px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            transition:0.3s;

            border:1px solid transparent;
       
		    cursor:pointer;

		    transition:0.3s ease;
		}

		.song-card:hover{

		    transform:scale(1.02);

		    background:#1f1f1f;

            border:1px solid rgba(157,107,255,0.3);
        }

        /* CURRENTLY PLAYING */

        .playing{

            background:
                    linear-gradient(to right,
                    rgba(157,107,255,0.22),
                    rgba(124,58,237,0.18));

            border:1px solid #9d6bff;

            box-shadow:0 0 18px rgba(157,107,255,0.4);
        }

        .playing .song-title{

            color:#b48cff;
        }

        .playing-animation{

            color:#9d6bff;

            margin-left:10px;

            animation:pulse 1s infinite;
        }

        @keyframes pulse{

            0%{
                opacity:0.4;
            }

            50%{
                opacity:1;
            }

            100%{
                opacity:0.4;
            }
        }

        /* SONG INFO */

        .song-info{

            display:flex;

            align-items:center;

            gap:18px;
        }

        .song-info img{

            width:75px;

            height:75px;

            border-radius:18px;

            object-fit:cover;
        }

        .song-title{

            font-size:20px;

            font-weight:bold;
        }

        .artist{

            color:#b3b3b3;

            margin-top:4px;
        }

        /* SONG ACTIONS */

        .song-actions i{

            font-size:20px;

            margin-left:22px;

            cursor:pointer;

            transition:0.3s;
        }

        .song-actions i:hover{

            color:#9d6bff;

            transform:scale(1.2);
        }

        .play-btn{

            color:#9d6bff;
        }

        .delete-btn{

            color:#ff4d4d;
        }

      


        
    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <div class="container-fluid">

        <a class="navbar-brand animate__animated animate__fadeInLeft"
           href="#">

            AURA

        </a>

		<a href="/usr/playlists" class="btn btn-outline-light">Back</a>
		   

    </div>

</nav>

<!-- MAIN CONTAINER -->

<div class="container">

    <!-- PLAYLIST HEADER -->

    <div class="playlist-header animate__animated animate__fadeIn">

        <h1 class="playlist-name"
            th:text="${playlist.playlistName}">

            Chill Vibes

        </h1>

        <p class="playlist-info">

            Total Songs:
            <span th:text="${playlistSongs != null ? #lists.size(playlistSongs) : 0}">
                15
            </span>

        </p>
		<!-- ADD THIS INSIDE playlist-header DIV -->
		<div class="d-flex flex-wrap gap-3 mt-4">

		    <!-- PLAY ALL BUTTON -->

			<button class="btn btn-light"
			        th:attr="data-playlistid=${playlist.playlistId}"
			        onclick="playAllSongs(this)">

			    <i class="fa-solid fa-play"></i>

			    Play All

			</button>

		    <!-- ADD SONG BUTTON -->

		    <button class="btn btn-lg btn-outline-light px-4 fw-bold"
		            data-bs-toggle="modal"
		            data-bs-target="#addSongModal">

		        <i class="fa-solid fa-plus me-2"></i>
		        Add Song

		    </button>

		</div>

    </div>

	<!-- SONG LIST -->

	<div th:if="${#lists.isEmpty(playlistSongs)}"
	     class="text-center text-secondary mt-5">

	    No Songs In Playlist

	</div>
	<div th:each="ps : ${playlistSongs}"

	     class="song-card animate__animated animate__fadeInUp"

	     th:attr="
	     data-title=${ps.title},
	     data-artist=${ps.artist},
	     data-image=${ps.imagePath},
	     data-audio=${ps.filePath},
	     data-songid=${ps.songId}"

	     onclick="playSong(this)">

	    <!-- SONG INFO -->

	    <div class="song-info">

	        <img th:src="@{${ps.imagePath}}"
	             src="https://picsum.photos/200">

	        <div>

	            <div class="song-title">

	                <span th:text="${ps.title}">
	                    Perfect
	                </span>

	            </div>

	            <div class="artist"
	                 th:text="${ps.artist}">

	                Ed Sheeran

	            </div>

	        </div>

	    </div>

	    <!-- SONG ACTIONS -->

	    <div class="song-actions">

	        <!-- PLAY ICON -->

	        <button class="btn btn-sm text-light"

	                onclick="event.stopPropagation(); playSong(this.parentElement.parentElement)">

	            <i class="fa-solid fa-circle-play"></i>

	        </button>

	        <!-- REMOVE SONG -->

	        <form th:action="@{/playlist/removeSong}"
	              method="post"

	              onclick="event.stopPropagation()">

	            <input type="hidden"
	                   name="songId"
	                   th:value="${ps.songId}">

	            <input type="hidden"
	                   name="playlistId"
	                   th:value="${playlist.playlistId}">

	            <button type="submit"
	                    class="btn btn-sm text-danger">

	                <i class="fa-solid fa-trash"></i>

	            </button>

	        </form>

	    </div>

	</div>
	<!-- ADD SONG MODAL -->

	<div class="modal fade"
	     id="addSongModal"
	     tabindex="-1">

	    <div class="modal-dialog modal-dialog-centered">

	        <div class="modal-content bg-dark text-light border-0 rounded-4">

	            <div class="modal-header border-secondary">

	                <h5 class="modal-title">

	                    Add Song To Playlist

	                </h5>

	                <button type="button"
	                        class="btn-close btn-close-white"
	                        data-bs-dismiss="modal">

	                </button>

	            </div>

	            <form th:action="@{/playlist/addSongByName}"
	                  method="post">

	                <div class="modal-body">

	                    <input type="hidden"
	                           name="playlistId"
	                           th:value="${playlist.playlistId}">

	                    <!-- SONG NAME -->

	                    <label class="mb-2">

	                        Song Name

	                    </label>

	                    <input type="text"
	                           class="form-control bg-secondary text-light border-0"
	                           name="songName"
	                           placeholder="Enter Song Name"
	                           required>

	                </div>

	                <div class="modal-footer border-secondary">

	                    <button type="submit"
	                            class="btn btn-primary">

	                        Add Song

	                    </button>

	                </div>

	            </form>

	        </div>

	    </div>

	</div>
	<script>

	    function playSong(button){
	        const title  = button.getAttribute("data-title");
	        const artist = button.getAttribute("data-artist");
	        const image  = button.getAttribute("data-image");
	        const audio  = button.getAttribute("data-audio");
	        const songId = button.getAttribute("data-songid");

	        localStorage.setItem("currentTitle", title);
	        localStorage.setItem("currentArtist", artist);
	        localStorage.setItem("currentImage", image);
	        localStorage.setItem("currentSong", audio);
	        localStorage.setItem("currentSongId", songId);

	        if(window.globalAudioPlayer){

	            window.globalAudioPlayer.src = audio;
	            window.globalAudioPlayer.play();

	        }

	        location.reload();

						fetch("/usr/song/incrementRepeat?songId=" + songId, {
			    method:"POST"
			});
	    }

	    /* PLAY ALL SONGS */

		function playAllSongs(button){

		    const playlistId =

		        button.getAttribute(
		            "data-playlistid"
		        );

		    // LOAD SESSION QUEUE

		    fetch(
		        "/api/queue/loadPlaylist?playlistId="
		        + playlistId,
		        {
		            method:"POST"
		        }
		    )

		    .then(() => {

		        // PLAY FIRST SONG

		        const songs =

		            document.querySelectorAll(
		                ".play-btn"
		            );

		        if(songs.length > 0){

		            songs[0].click();
		        }
		    });
		}

	</script>

<div th:replace="player.html"></div>



<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
