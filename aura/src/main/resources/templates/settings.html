<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>AURA - Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body{
            background:
                    linear-gradient(rgba(0,0,0,0.85),
                    rgba(0,0,0,0.9)),
                    url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-attachment:fixed;
            color:white;
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
        }

        /* NAVBAR */

        .navbar{
            background:rgba(0,0,0,0.75);
            backdrop-filter:blur(10px);
        }

        .navbar-brand{
            color:#8b5cf6 !important;
            font-size:30px;
            font-weight:bold;
            letter-spacing:2px;
        }

        /* PROFILE CONTAINER */

        .profile-container{
            margin-top:40px;
            margin-bottom:50px;
        }

        .profile-card{

            background:rgba(18,18,18,0.92);

            border-radius:25px;

            padding:35px;

            box-shadow:0 10px 40px rgba(0,0,0,0.6);
        }

        /* PROFILE HEADER */

        .profile-header{
            text-align:center;
            margin-bottom:40px;
        }

        .avatar-wrapper{
            position:relative;
            width:140px;
            margin:auto;
        }

        .profile-avatar{
            width:140px;
            height:140px;
            border-radius:50%;
            border:4px solid #8b5cf6;
            object-fit:cover;
        }

        .upload-btn{

            position:absolute;
            bottom:5px;
            right:5px;

            background:#8b5cf6;

            width:40px;
            height:40px;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            cursor:pointer;
        }

        .profile-header h2{
            margin-top:18px;
            font-weight:bold;
        }

        .profile-header p{
            color:#b3b3b3;
        }

        /* SECTION */

        .section-title{
            color:#8b5cf6;
            font-weight:bold;
            margin-bottom:20px;
            margin-top:10px;
        }

        /* FORM */

        .form-control,
        .form-select{

            background:#222;
            border:none;
            color:white;
            border-radius:12px;
            padding:12px;
        }

        .form-control:focus,
        .form-select:focus{

            background:#2d2d2d;
            color:white;

            border:1px solid #8b5cf6;
            box-shadow:none;
        }

        .form-label{
            color:#d1d1d1;
        }

        /* BUTTONS */

        .btn-aura{

            background:linear-gradient(to right,#8b5cf6,#7c3aed);

            border:none;
            color:white;

            border-radius:12px;

            padding:12px 20px;

            font-weight:bold;

            transition:0.3s;
        }

        .btn-aura:hover{

            transform:scale(1.03);

            box-shadow:0 0 12px rgba(139,92,246,0.6);
        }

        /* SETTINGS CARD */

        .settings-box{

            background:#1d1d1d;

            border-radius:18px;

            padding:20px;

            margin-bottom:20px;
        }

        .form-check-input:checked{
            background-color:#8b5cf6;
            border-color:#8b5cf6;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .profile-card{
                padding:25px;
            }
        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">
            AURA
        </a>

        <button class="btn btn-outline-light">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </button>

    </div>

</nav>

<!-- PROFILE -->

<div class="container profile-container">

    <div class="profile-card">

        <!-- PROFILE HEADER -->

        <div class="profile-header">

            <div class="avatar-wrapper">

                <img src="https://i.pravatar.cc/300"
                     class="profile-avatar">

                <div class="upload-btn">
                    <i class="fa-solid fa-camera"></i>
                </div>

            </div>

            <h2 th:text="${user.name}">
                Prakash
            </h2>

            <p th:text="${user.email}">
                prakash@gmail.com
            </p>

        </div>

        <!-- USER INFO -->

        <h4 class="section-title">
            User Information
        </h4>

        <form>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           class="form-control"
                           value="Prakash">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input type="text"
                           class="form-control"
                           value="prakash123">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       class="form-control"
                       value="prakash@gmail.com">

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Bio
                </label>

                <textarea class="form-control"
                          rows="3">Music lover 🎵</textarea>

            </div>

            <button class="btn btn-aura">
                <i class="fa-solid fa-pen"></i>
                Edit Profile
            </button>

        </form>

        <!-- CHANGE PASSWORD -->

        <h4 class="section-title mt-5">
            Change Password
        </h4>

        <form>

            <div class="mb-3">

                <label class="form-label">
                    Current Password
                </label>

                <input type="password"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    New Password
                </label>

                <input type="password"
                       class="form-control">

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Confirm New Password
                </label>

                <input type="password"
                       class="form-control">

            </div>

            <button class="btn btn-aura">
                <i class="fa-solid fa-key"></i>
                Update Password
            </button>

        </form>

        <!-- ACCOUNT SETTINGS -->

        <h4 class="section-title mt-5">
            Account Settings
        </h4>

        <!-- NOTIFICATIONS -->

        <div class="settings-box">

            <h5>
                Notification Preferences
            </h5>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="checkbox"
                       checked>

                <label class="form-check-label">
                    Email Notifications
                </label>

            </div>

            <div class="form-check mt-2">

                <input class="form-check-input"
                       type="checkbox"
                       checked>

                <label class="form-check-label">
                    Push Notifications
                </label>

            </div>

        </div>

        <!-- THEME SETTINGS -->

        <div class="settings-box">

            <h5>
                Theme Settings
            </h5>

            <select class="form-select mt-3">

                <option selected>
                    Dark Mode
                </option>

                <option>
                    Light Mode
                </option>

                <option>
                    Purple Neon
                </option>

            </select>

        </div>

        <!-- PRIVACY -->

        <div class="settings-box">

            <h5>
                Privacy Controls
            </h5>

            <div class="form-check mt-3">

                <input class="form-check-input"
                       type="checkbox"
                       checked>

                <label class="form-check-label">
                    Make Profile Public
                </label>

            </div>

            <div class="form-check mt-2">

                <input class="form-check-input"
                       type="checkbox">

                <label class="form-check-label">
                    Show Listening Activity
                </label>

            </div>

        </div>

        <!-- SAVE BUTTON -->

        <div class="text-center mt-4">

            <button class="btn btn-aura px-5">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Settings

            </button>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
