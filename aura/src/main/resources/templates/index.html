<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Streaming Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body{
            background: linear-gradient(to bottom,#121212,#1c1c1c);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding-bottom: 150px;
        }

        /* NAVBAR */

        .navbar{
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .navbar-brand{
            font-size: 28px;
            font-weight: bold;
            color: #1DB954 !important;
        }

        .profile-icon{
            width: 45px;
            height: 45px;
            background: #1DB954;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* SECTION */

        .section-title{
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* CARDS */

        .music-card{
            background: #181818;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            border: none;
        }

        .music-card:hover{
            transform: translateY(-8px);
            background: #242424;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .music-card img{
            height: 220px;
            object-fit: cover;
        }

        .music-card .card-body{
            color: white;
        }

        .music-card h5{
            font-weight: bold;
        }

        .music-card p{
            color: #b3b3b3;
        }

        /* ARTIST */

        .artist-card{
            text-align: center;
        }

        .artist-card img{
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #1DB954;
            object-fit: cover;
            transition: 0.3s;
        }

        .artist-card img:hover{
            transform: scale(1.08);
        }

        /* PLAYER BAR */

        .player-bar{
            position: fixed;
            bottom: 70px;
            left: 0;
            width: 100%;
            background: #111;
            border-top: 1px solid #333;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .song-details{
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .song-details img{
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        .controls i{
            font-size: 24px;
            margin: 0 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .controls i:hover{
            color: #1DB954;
        }

        .play-btn{
            font-size: 35px !important;
            color: #1DB954;
        }

        /* BOTTOM NAVIGATION */

        .bottom-nav{
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .bottom-nav a{
            color: #b3b3b3;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .bottom-nav a:hover{
            color: #1DB954;
        }

        .bottom-nav i{
            font-size: 22px;
            display: block;
            margin-bottom: 5px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .player-bar{
                flex-direction: column;
                gap: 10px;
            }

            .song-details{
                text-align: center;
            }
        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark sticky-top px-3">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">Musicify</a>

        <div class="profile-icon">
            <i class="fa-solid fa-user"></i>
        </div>

    </div>

</nav>

<!-- MAIN CONTENT -->

<div class="container mt-4">

    <!-- TRENDING SONGS -->

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="section-title">Top Trending Songs</h2>
    </div>

    <div class="row g-4">

        <div class="col-md-3 col-sm-6"
             th:each="song : ${songs}">

            <div class="card music-card">

                <img th:src="${song.image}"
                     src="https://picsum.photos/300?1"
                     class="card-img-top">

                <div class="card-body">

                    <h5 th:text="${song.name}">Perfect</h5>

                    <p th:text="${song.artist}">
                        Ed Sheeran
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- PLAYLISTS -->

    <div class="mt-5 mb-3">
        <h2 class="section-title">Trending Playlists</h2>
    </div>

    <div class="row g-4">

        <div class="col-md-4"
             th:each="playlist : ${playlists}">

            <div class="card music-card">

                <img th:src="${playlist.image}"
                     src="https://picsum.photos/300?2"
                     class="card-img-top">

                <div class="card-body">

                    <h5 th:text="${playlist.name}">
                        Chill Vibes
                    </h5>

                    <p th:text="${playlist.count}">
                        40 Songs
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- ARTISTS -->

    <div class="mt-5 mb-4">
        <h2 class="section-title">Popular Artists</h2>
    </div>

    <div class="row text-center g-4">

        <div class="col-md-3 col-6"
             th:each="artist : ${artists}">

            <div class="artist-card">

                <img th:src="${artist.image}"
                     src="https://picsum.photos/200?3">

                <h5 class="mt-3"
                    th:text="${artist.name}">
                    Arijit Singh
                </h5>

            </div>

        </div>

    </div>

</div>

<!-- PLAYER BAR -->

<div class="player-bar">

    <div class="song-details">

        <img src="https://picsum.photos/200?4">

        <div>
            <h6 class="mb-0">Perfect</h6>
            <small class="text-secondary">
                Ed Sheeran
            </small>
        </div>

    </div>

    <div class="controls">

        <i class="fa-solid fa-backward-step"></i>

        <i class="fa-solid fa-circle-play play-btn"></i>

        <i class="fa-solid fa-forward-step"></i>

    </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <a href="#">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="#">
        <i class="fa-solid fa-magnifying-glass"></i>
        Search
    </a>

    <a href="#">
        <i class="fa-solid fa-music"></i>
        Playlists
    </a>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
