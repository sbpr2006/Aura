<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>AURA - Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body{
            background:
                    linear-gradient(rgba(0,0,0,0.85),
                    rgba(0,0,0,0.9)),
                    url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=1470&auto=format&fit=crop');

            background-size:cover;
            background-attachment:fixed;
            color:white;
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
        }
		 
		/*		LOGOUT BUTTON			*/
		.logout-btn-fixed{

		    position:fixed;

		    bottom:25px;
		    right:25px;

		    width:65px;
		    height:65px;

		    border-radius:50%;

		    background:linear-gradient(to right,#ff4b4b,#ff1f1f);

		    display:flex;
		    justify-content:center;
		    align-items:center;

		    color:white;

		    font-size:24px;

		    text-decoration:none;

		    box-shadow:0 0 18px rgba(255,0,0,0.5);

		    z-index:9999;

		    transition:0.3s;
		}

		.logout-btn-fixed:hover{

		    transform:scale(1.08);

		    color:white;

		    box-shadow:0 0 25px rgba(255,0,0,0.9);
		}

        /* NAVBAR */

        .navbar{
            background:rgba(0,0,0,0.75);
            backdrop-filter:blur(10px);
        }

        .navbar-brand{
            color:#8b5cf6 !important;
            font-size:30px;
            font-weight:bold;
            letter-spacing:2px;
        }

        /* PROFILE CONTAINER */

        .profile-container{
            margin-top:40px;
            margin-bottom:50px;
        }

        .profile-card{

            background:rgba(18,18,18,0.92);

            border-radius:25px;

            padding:35px;

            box-shadow:0 10px 40px rgba(0,0,0,0.6);
        }

        /* PROFILE HEADER */

        .profile-header{
            text-align:center;
            margin-bottom:40px;
        }

        .avatar-wrapper{
            position:relative;
            width:140px;
            margin:auto;
        }


        .upload-btn{

            position:absolute;
            bottom:5px;
            right:5px;

            background:#8b5cf6;

            width:40px;
            height:40px;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            cursor:pointer;
        }

        .profile-header h2{
            margin-top:18px;
            font-weight:bold;
        }

        .profile-header p{
            color:#b3b3b3;
        }

        /* SECTION */

        .section-title{
            color:#8b5cf6;
            font-weight:bold;
            margin-bottom:20px;
            margin-top:10px;
        }

        /* FORM */

        .form-control,
        .form-select{

            background:#222;
            border:none;
            color:white;
            border-radius:12px;
            padding:12px;
        }

        .form-control:focus,
        .form-select:focus{

            background:#2d2d2d;
            color:white;

            border:1px solid #8b5cf6;
            box-shadow:none;
        }

        .form-label{
            color:#d1d1d1;
        }

        /* BUTTONS */

        .btn-aura{

            background:linear-gradient(to right,#8b5cf6,#7c3aed);

            border:none;
            color:white;

            border-radius:12px;

            padding:12px 20px;

            font-weight:bold;

            transition:0.3s;
        }

        .btn-aura:hover{

            transform:scale(1.03);

            box-shadow:0 0 12px rgba(139,92,246,0.6);
        }

        /* SETTINGS CARD */

        .settings-box{

            background:#1d1d1d;

            border-radius:18px;

            padding:20px;

            margin-bottom:20px;
        }

        .form-check-input:checked{
            background-color:#8b5cf6;
            border-color:#8b5cf6;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .profile-card{
                padding:25px;
            }
        }
		
		/* NOW PLAYING DISK */

		.now-playing-disk{

		    position:fixed;

		    bottom:25px;
		    left:25px;

		    width:75px;
		    height:75px;

		    border-radius:50%;

		    overflow:hidden;

		    border:4px solid #8b5cf6;

		    box-shadow:0 0 18px rgba(139,92,246,0.7);

		    z-index:9999;

		    animation:spinDisk 6s linear infinite;

		    transition:0.3s;
		}

		.now-playing-disk:hover{

		    transform:scale(1.08);

		    box-shadow:0 0 25px rgba(139,92,246,1);
		}

		.now-playing-disk img{

		    width:100%;
		    height:100%;

		    object-fit:cover;
		}

		/* ROTATING EFFECT */

		@keyframes spinDisk{

		    from{
		        transform:rotate(0deg);
		    }

		    to{
		        transform:rotate(360deg);
		    }
		}
		
		.profile-btn{

					width:140px;
		            height:140px;
		            border-radius:50%;
		            border:4px solid #8b5cf6;
		            object-fit:fill;

					    background:linear-gradient(
					        135deg,
					        #8b5cf6,
					        #06b6d4
					    );

					    color:white;

					    display:flex;

					    align-items:center;

					    justify-content:center;

					    font-size:80px;

					    font-weight:700;

					    text-transform:uppercase;

					    cursor:pointer;

					    user-select:none;

					    transition:0.3s ease;

					    box-shadow:
					        0 0 10px rgba(139,92,246,0.4);
					}

					.profile-btn:hover{

					    transform:scale(1.08);

					    box-shadow:
					        0 0 18px rgba(6,182,212,0.6);
					}
    </style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark px-4">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">
            AURA
        </a>

		<a href="/usr/home" class="btn btn-outline-light">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </a>

    </div>

</nav>

<!-- SUCCESS MESSAGE -->

<div th:if="${success}"
     class="alert alert-success alert-dismissible fade show mt-3"
     role="alert">

    <i class="fa-solid fa-circle-check"></i>

    <span th:text="${success}"></span>

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>

</div>

<!-- ERROR MESSAGE -->

<div th:if="${error}"
     class="alert alert-danger alert-dismissible fade show mt-3"
     role="alert">

    <i class="fa-solid fa-circle-exclamation"></i>

    <span th:text="${error}"></span>

    <button type="button"
            class="btn-close"
            data-bs-dismiss="alert">
    </button>

</div>

<!-- PROFILE -->

<div class="container profile-container">

    <div class="profile-card">

        <!-- PROFILE HEADER -->

        <div class="profile-header">

            <div class="avatar-wrapper">

				<div class="profile-btn"
				             th:text="${#strings.substring(session.username,0,1).toUpperCase()}">U
				</div>

            </div>

            <h2 th:text="${user.username}">
            </h2>

            <p th:text="${user.email}">
            </p>

        </div>

		<!-- USER INFO -->

		<h4 class="section-title">
		    User Information
		</h4>

		<form th:action="@{/usr/updateProfile}"
		      method="post">

		    <div class="row">

		        <!-- FULL NAME -->

		        <div class="col-md-6 mb-3">

		            <label class="form-label">
		                Full Name
		            </label>

		            <input type="text"
		                   name="name"
		                   class="form-control"
		                   th:value="${user.name}">

		        </div>

		        <!-- USERNAME -->

		        <div class="col-md-6 mb-3">

		            <label class="form-label">
		                Username
		            </label>

		            <input type="text"
		                   name="username"
		                   class="form-control"
		                   th:value="${user.username}">

		        </div>

		    </div>

		    <!-- EMAIL -->

		    <div class="mb-3">

		        <label class="form-label">
		            Email Address
		        </label>

		        <input type="email"
		               name="email"
		               class="form-control"
		               th:value="${user.email}">

		    </div>

		    <!-- BIO -->

		    <div class="mb-4">

		        <label class="form-label">
		            Bio
		        </label>

		        <textarea class="form-control"
		                  name="bio"
		                  rows="3"
		                  th:text="${user.bio}"></textarea>

		    </div>

		    <!-- BUTTON -->

		    <button type="submit"
		            class="btn btn-aura">

		        <i class="fa-solid fa-floppy-disk"></i>

		        Save Profile

		    </button>

		</form>
        <!-- CHANGE PASSWORD -->

        <h4 class="section-title mt-5">
            Change Password
        </h4>

		<form th:action="@{/usr/changePassword}"
		      method="post">

		    <!-- CURRENT PASSWORD -->
			<form th:action="@{/usr/changePassword}"
			      method="post">

			    <input type="password"
			           name="currentPassword"
			           placeholder="Current Password"
			           class="form-control mb-3"
			           required>

			    <input type="password"
			           name="newPassword"
			           placeholder="New Password"
			           class="form-control mb-3"
			           required>

			    <input type="password"
			           name="confirmPassword"
			           placeholder="Confirm Password"
			           class="form-control mb-3"
			           required>

			    <button type="submit"
			            class="btn btn-aura">

			        Update Password

			    </button>

			</form>

	<!-- NOW PLAYING MINI DISK -->

	<a id="nowPlayingLink"
	   href="/usr/nowPlaying"
	   class="now-playing-disk">

	    <img id="miniPlayerImage"
	         src="https://picsum.photos/200"
	         alt="Now Playing">

	</a>
	<script src="/player.js"></script>

	<script>

		window.addEventListener("load", () => {

		    const savedImage = localStorage.getItem("currentImage");
		    if (savedImage) {
		        document.getElementById("miniPlayerImage").src = savedImage;
		    }

		    const songId = localStorage.getItem("currentSongId");
		    if (songId) {
		        document.getElementById("nowPlayingLink").href = "/usr/nowPlaying?songId=" + songId;
		    }
		});

	</script>
	
	
	<!-- FIXED LOGOUT BUTTON -->

	<a href="/usr/logout"
	   class="logout-btn-fixed">

	    <i class="fa-solid fa-right-from-bracket"></i>

	</a>
<script src="/player.js"></script>
<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
